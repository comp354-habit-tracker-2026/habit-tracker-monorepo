name: Jest Unit and Component Tests CI
run-name: Jest Unit Tests on ${{ github.ref_name }} by @${{ github.actor }} 🚀

# This workflow is going to be triggered every time there is a PUSH or PULL_REQUEST
on:
  push:
    branches: ["main"]
    paths:
      - 'frontend/**'
      - '.github/workflows/jest-ci.yml'
  pull_request:
    branches: ["main"]
    paths:
      - 'frontend/**'
      - '.github/workflows/jest-ci.yml'

permissions:
  contents: read

jobs:
  jest-unit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code 
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
      
    - name: Install dependencies
      run: npm ci
      working-directory: ./frontend

#	  Run Jest Tests
    - name: Run Jest Tests
      run: npm run test:coverage | tee jest-output.log
      working-directory: ./frontend

#   Upload Jest Coverage
    - name: Upload Jest coverage
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: jest-coverage
        path: frontend/coverage

#     Upload Jest Logs
    - name: Upload Jest logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: jest-logs
        path: frontend/jest-output.log