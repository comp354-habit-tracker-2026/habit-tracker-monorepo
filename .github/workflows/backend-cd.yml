name: Trigger auto deployment for backend

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - "backend/**"
    - ".github/workflows/backend-cd.yml"

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.BACKEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.BACKEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.BACKEND_AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v2
        with:
          registry: habitregistry.azurecr.io
          username: ${{ secrets.BACKEND_REGISTRY_USERNAME }}
          password: ${{ secrets.BACKEND_REGISTRY_PASSWORD }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v4
        with:
          context: ${{ github.workspace }}/backend
          push: true
          tags: habitregistry.azurecr.io/backend:${{ github.sha }}

      - name: Update Azure Container App
        uses: azure/cli@v2
        with:
          azcliversion: 2.67.0
          inlineScript: |
            echo "===== DEBUG: Azure CLI version ====="
            az version

            echo "===== DEBUG: Account context ====="
            az account show --query "{name:name,id:id,tenantId:tenantId,user:user.name}" -o table

            echo "===== DEBUG: Subscription list (current tenant) ====="
            az account list --query "[].{name:name,id:id,tenantId:tenantId,isDefault:isDefault}" -o table

            echo "===== DEBUG: Resolve configured subscription ====="
            az account set --subscription ${{ secrets.BACKEND_AZURE_SUBSCRIPTION_ID }}
            az account show --query "{name:name,id:id,tenantId:tenantId,user:user.name}" -o table

            echo "===== DEBUG: Identity verification ====="
            az ad signed-in-user show --query "{id:id,userPrincipalName:userPrincipalName}" -o table || echo "No signed-in user (expected for service principal auth)"
            az ad sp show --id ${{ secrets.BACKEND_AZURE_CLIENT_ID }} --query "{appId:appId,displayName:displayName,id:id}" -o table || echo "Service principal lookup failed"

            echo "===== DEBUG: Resource group checks ====="
            az group show --name habit-tracker-rg --subscription ${{ secrets.BACKEND_AZURE_SUBSCRIPTION_ID }} --query "{name:name,location:location,id:id}" -o table

            echo "===== DEBUG: Microsoft.App provider ====="
            az provider show --namespace Microsoft.App --query "{namespace:namespace,registrationState:registrationState}" -o table

            echo "===== DEBUG: Container Apps extension ====="
            az extension show --name containerapp --query "{name:name,version:version}" -o table || echo "containerapp extension details unavailable"

            echo "===== DEBUG: Managed environments in RG ====="
            az containerapp env list --resource-group habit-tracker-rg --subscription ${{ secrets.BACKEND_AZURE_SUBSCRIPTION_ID }} --query "[].{name:name,location:location,id:id}" -o table

            echo "===== DEBUG: Container apps in RG ====="
            az containerapp list --resource-group habit-tracker-rg --subscription ${{ secrets.BACKEND_AZURE_SUBSCRIPTION_ID }} --query "[].{name:name,location:location,latestRevisionName:properties.latestRevisionName}" -o table

            echo "===== DEBUG: Target container app by name ====="
            az containerapp show \
              --name backend \
              --resource-group habit-tracker-rg \
              --subscription ${{ secrets.BACKEND_AZURE_SUBSCRIPTION_ID }} \
              --query "{name:name,id:id,location:location,environmentId:properties.managedEnvironmentId}" \
              -o table || echo "Target container app not found via az containerapp show"

            echo "===== DEBUG: Target container app by resource ID ====="
            az resource show \
              --ids /subscriptions/${{ secrets.BACKEND_AZURE_SUBSCRIPTION_ID }}/resourceGroups/habit-tracker-rg/providers/Microsoft.App/containerApps/backend \
              --query "{name:name,id:id,type:type}" \
              -o table || echo "Target container app not found via az resource show"

            echo "===== DEBUG: Starting update command ====="
            az containerapp update \
              --name backend \
              --resource-group habit-tracker-rg \
              --subscription ${{ secrets.BACKEND_AZURE_SUBSCRIPTION_ID }} \
              --container-name backend \
              --image habitregistry.azurecr.io/backend:${{ github.sha }}


