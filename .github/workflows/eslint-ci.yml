name: ESLint Tests CI
run-name: ESLint Tests on ${{ github.ref_name }} by @${{ github.actor }} 🚀

# This workflow is going to be triggered every time there is a PUSH or PULL_REQUEST
on:
  push:
    branches: ["main", "integration/g26-171-linting-setup"]
    paths:
      - 'frontend/**'
      - '.github/workflows/eslint-ci.yml'
  pull_request:
    branches: ["main"]
    paths:
      - 'frontend/**'
      - '.github/workflows/eslint-ci.yml'

permissions:
  contents: read

jobs:
  eslint-unit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code 
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
      
    - name: Install dependencies
      run: npm ci
      working-directory: ./frontend

#	  Run ESLint Tests
    - name: Run ESLint Tests
      run: npm run lint
      working-directory: ./frontend