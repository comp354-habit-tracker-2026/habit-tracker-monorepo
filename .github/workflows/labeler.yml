# Actions workflow — it defines WHEN and HOW the labeler runs

name: Label Pull Requests

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
    # Trigger this workflow when a PR is:
    # - opened (brand new PR)
    # - synchronize (new commits pushed to existing PR)
    # - reopened (a closed PR was reopened)

jobs:
  label:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/labeler@v5  # Use GitHub's official labeler action (version 5)
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"