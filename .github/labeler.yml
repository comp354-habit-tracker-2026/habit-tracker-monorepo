# -----------------------------------------------
# BASIC AREA LABELS
# -----------------------------------------------

# Any change in the frontend/ folder
Frontend:
  - changed-files:
    - any-glob-to-any-file: 'frontend/**'

# Any change in the backend/ folder
Backend:
  - changed-files:
    - any-glob-to-any-file: 'backend/**'

# Any markdown or docs change anywhere in the repo
documentation:
  - changed-files:
    - any-glob-to-any-file: '**/*.md'
    - any-glob-to-any-file: 'docs/**'

# Any CI/CD or GitHub Actions change
CI/CD - group 25:
  - changed-files:
    - any-glob-to-any-file: '.github/**'

# -----------------------------------------------
# BACKEND SUBSYSTEM LABELS
# -----------------------------------------------

analytics:
  - changed-files:
    - any-glob-to-any-file: 'backend/analytics/**'

activities:
  - changed-files:
    - any-glob-to-any-file: 'backend/activities/**'

users:
  - changed-files:
    - any-glob-to-any-file: 'backend/users/**'

goals:
  - changed-files:
    - any-glob-to-any-file: 'backend/goals/**'

notifications:
  - changed-files:
    - any-glob-to-any-file: 'backend/notifications/**'

data-integration:
  - changed-files:
    - any-glob-to-any-file: 'backend/data_integration/**'

core:
  - changed-files:
    - any-glob-to-any-file: 'backend/core/**'

data:
  - changed-files:
