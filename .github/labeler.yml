# -----------------------------------------------
# FRONTEND SUBSYSTEM LABELS
# -----------------------------------------------

frontend/src:
  - changed-files:
    - any-glob-to-any-file: 'frontend/src/**'

frontend/cypress:
  - changed-files:
    - any-glob-to-any-file: 'frontend/cypress/**'

frontend/public:
  - changed-files:
    - any-glob-to-any-file: 'frontend/public/**'

# -----------------------------------------------
# PR SIZE LABELS
# Based on total lines changed
# -----------------------------------------------

XS:
  - changed-files:
      - any-glob-to-any-file: '**'
    max-lines-changed: 10

S:
  - changed-files:
      - any-glob-to-any-file: '**'
    min-lines-changed: 11
    max-lines-changed: 50

M:
  - changed-files:
      - any-glob-to-any-file: '**'
    min-lines-changed: 51
    max-lines-changed: 200

L:
  - changed-files:
      - any-glob-to-any-file: '**'
    min-lines-changed: 201
    max-lines-changed: 500

XL:
  - changed-files:
      - any-glob-to-any-file: '**'
    min-lines-changed: 501