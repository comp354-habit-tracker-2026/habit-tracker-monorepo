# -----------------------------------------------
# BASIC AREA LABELS
# -----------------------------------------------

# Any change in the frontend/ folder
frontend:
  - changed-files:
      - any-glob-to-any-file: 'frontend/**'

# Any change in the backend/ folder
backend:
  - changed-files:
      - any-glob-to-any-file: 'backend/**'

# Any markdown or docs change anywhere in the repo
documentation:
  - changed-files:
      - any-glob-to-any-file: '**/*.md'
      - any-glob-to-any-file: 'docs/**'

# Any CI/CD or GitHub Actions change
CI/CD - group 25:
  - changed-files:
      - any-glob-to-any-file: '.github/**'

